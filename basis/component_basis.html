<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <script src="./dist/vue.js" type="text/javascript"></script>
</head>

<body>
    <div id="app">
        <button-counter title="title-1" @justclick="clicknow">
            <h2>Hi……h2</h2>
        </button-counter>
        <button-counter title="title-2"></button-counter>
    </div>
    <script type="text/javascript">
        Vue.component("button-counter", {
            props: ["title"],
            data: function () {
                return {
                    count: 0
                }
            },
            template: '<div><h2>Hi……</h2><button v-on:click="clickfun">{{title}} You clicked me {{count}} times.</button><slot></slot></div>',
            methods: {
                clickfun: function () {
                    this.count++;
                    this.$emit("justclick", this.count);
                }
            }
        });

        var vm = new Vue({
            el: "#app",
            data: {
            },
            methods: {
                clicknow: function (e) {
                    console.log(e);
                }
            }
        });
    </script>
</body>

</html>
