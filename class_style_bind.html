<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <script src="./dist/vue.js" type="text/javascript"></script>
</head>

<body>
    <div id="app">
        <div class="test" v-bind:class="{active: isActive}"
            style="width: 200px;height: 200px;text-align: center;line-height: 200px;">
            hi vue
        </div>
        <div :style="{color:color,fontSize:size,background:isBlue ? 'blue':''}">
            hello vue
        </div>
    </div>
    </div>
    <script type="text/javascript">
        var vm = new Vue({
            el: "#app",
            data: {
                isActive: true,
                color: "orange",
                size: '40px',
                isBlue: true
            }
        })
    </script>
    <style type="text/css">
        .active {
            background: red;
        }

        .test {
            font-size: 40px;
        }
    </style>
</body>

</html>
