<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <script src="./dist/vue.js" type="text/javascript"></script>
</head>

<body>
    <div id="app">
        <div id="example-1">
            <input type="text" v-model="message" placeholder="input some message">
            <p>Message you inputed is : {{message}}</p>
            <textarea v-model="multiline_message" placeholder="input some multiline message"></textarea>
            <p style="white-space: pre-line;">{{multiline_message}}</p>
            <br />

            <div style="margin-top: 20px;">
                <input type="checkbox" id="lily" value="lily" v-model="checkedNames">
                <label for="lily">lily</label>
                <input type="checkbox" id="julie" value="julie" v-model="checkedNames">
                <label for="julie">julie</label>
                <input type="checkbox" id="mike" value="mike" v-model="checkedNames">
                <label for="mike">mike</label>
                <br />
                <span>Checked names : {{checkedNames}}</span>
            </div>

            <div style="margin-top: 20px;">
                <input type="radio" id="first" value="first" v-model="picked">
                <label for="first">first</label>
                <input type="radio" id="second" value="second" v-model="picked">
                <label for="second">second</label>
                <br />
                <span>Picked: {{picked}}</span>
            </div>

            <button type="button" @click="subbmit">提交</button>
        </div>
    </div>
    <script type="text/javascript">
        var vm = new Vue({
            el: "#app",
            data: {
                message: "single line message",
                multiline_message: "multiline message",
                checkedNames: ["julie", "mike"],
                picked: "second"
            },
            methods: {
                subbmit: function () {
                    // console.log(this.message);
                    var formData = {
                        smsg: this.message,
                        mmsg: this.multiline_message,
                        checkedNames: this.checkedNames,
                        radioVal: this.picked
                    };
                    console.log(formData);
                }
            }
        })
    </script>
</body>

</html>
