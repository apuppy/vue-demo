<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <script src="./dist/vue.js" type="text/javascript"></script>
</head>

<body>
    <div id="app">
        <div id="example-1">
            <button v-on:click="counter += 1">数值：{{counter}}</button>
            <button v-on:click="greeting('你好啊',$event)">Greeting</button>
        </div>
    </div>
    <script type="text/javascript">
        var vm = new Vue({
            el: "#app",
            data: {
                counter: 0
            },
            methods: {
                greeting: function (words, e) {
                    alert(words);
                    alert(this.counter);
                    console.log(e);
                }
            }
        })
    </script>
</body>

</html>
