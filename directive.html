<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <script src="./dist/vue.js" type="text/javascript"></script>
</head>

<body>
    <div id="app">
        <p v-if="seen">You can see me now.</p>
        <a v-bind:href="url">awesome vue link</a>
        <div @click="outClick">
            <!-- <div @click="innerClick"> -->
            <!-- @click.stop可以禁止事件冒泡 -->
            <div @click.stop="innerClick"></div>
            try click me
        </div>
    </div>
    </div>
    <script type="text/javascript">
        var vm = new Vue({
            el: "#app",
            data: {
                seen: true,
                url: "https://github.com/vuejs/awesome-vue"
            },
            methods: {
                outClick: function () {
                    console.log("out click…………");
                },
                innerClick: function () {
                    console.log("inner click…………");
                }
            }
        });
    </script>
    <style type="text/css">

    </style>
</body>

</html>
