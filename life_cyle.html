<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <script src="./dist/vue.js" type="text/javascript"></script>
</head>

<body>
    <div id="app">
        {{msg}}
    </div>
    <script type="text/javascript">
        var vm = new Vue({
            el: "#app",
            data: {
                msg: "Hi vue!"
            },

            //在实例初始化之前，数据观测(data observer)和event/watcher事件配置之前调用
            beforeCreate: function () {
                console.log("before create");
            },

            //实例创建后立即调用
            //已完成数据观测（data observer），属性和方法的运算，watch/event事件回调
            //挂载还未开始，$el属性目前不可见
            created: function () {
                console.log("created");
            },

            //在挂载开始之前被调用，渲染函数首次被调用
            beforeMount: function () {
                console.log("berfore mount");
            },

            //el被新创建的vm.$el替换，挂载成功
            mounted: function () {
                console.log("mounted");
            },

            //数据更新前调用
            beforeUpdate: function () {
                console.log("before update");
            },

            //组件DOM更新后
            updated: function () {
                console.log("updated");
            }
        });
        setTimeout(function () {
            vm.msg = "changed ……";
        }, 3000);
    </script>
</body>

</html>
