<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>
    <script src="./dist/vue.js" type="text/javascript"></script>
</head>

<body>
    <div id="app">
        <button-counter></button-counter>
        <demo></demo>
    </div>
    <script type="text/javascript">
        Vue.component("button-counter", {
            props: ["title"],
            data: function () {
                return {
                    count: 0
                }
            },
            template: '<div><button v-on:click="clickfun">You clicked me {{count}} times.</button></div>',
            methods: {
                clickfun: function () {
                    this.count++;
                }
            }
        });

        var vm = new Vue({
            el: "#app",
            data: {
            },
            methods: {
            },
            components: {
                demo: {
                    template: "<h2>H2……</h2>"
                }
            }
        });
    </script>
</body>

</html>
